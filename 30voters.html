            margin: 20px 0;
            gap: 5px;
        }
        .pagination button {
            background-color: #ff6f00;
            color: white;
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
        }
        .pagination button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .pagination span {
            padding: 8px 12px;
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            table, th, td {
                font-size: 12px;
            }
            th, td {
                padding: 8px;
            }
            #searchInput, #searchAttribute {
                width: 100%;
            }
        }

        /* Allow table to scroll horizontally on small screens */
        @media (max-width: 480px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>

        ];

        // Variables for pagination
        let currentPage = 1;
        const rowsPerPage = 20;
        let filteredVoters = [];
        let allVoters = [];

        // Initialize the data
        document.addEventListener('DOMContentLoaded', function() {
            allVoters = votersData;
            filteredVoters = [...allVoters];
            displayVoters();
            updatePagination();
        });

        // Function to display voters
        function displayVoters() {
            const tableBody = document.querySelector('#voters-table tbody');
            tableBody.innerHTML = '';

            const startIndex = (currentPage - 1) * rowsPerPage;
            const endIndex = startIndex + rowsPerPage;
            const votersToDisplay = filteredVoters.slice(startIndex, endIndex);

            if (votersToDisplay.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align: center;">No voters found matching your search.</td></tr>`;
                return;
            }

            votersToDisplay.forEach(voter => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${voter['Serial Number'] || ''}</td>
                    <td>${voter['Name'] || ''}</td>
                    <td>${voter['Relative\'s Name'] || ''}</td>
                    <td>${voter['House Number'] || ''}</td>
                    <td>${voter['Age'] || ''}</td>
                    <td>${voter['Gender'] || ''}</td>
                    <td>${voter['EPIC Number'] || ''}</td>
                    <td>${voter['Section No and Name'] || ''}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Function to update pagination controls
        function updatePagination() {
            const totalPages = Math.ceil(filteredVoters.length / rowsPerPage);
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages || 1}`;
            
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        }

        // Event listeners for pagination
        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                displayVoters();
                updatePagination();
                window.scrollTo(0, 0);
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            const totalPages = Math.ceil(filteredVoters.length / rowsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayVoters();
                updatePagination();
                window.scrollTo(0, 0);
            }
        });

        // Search functionality
        document.getElementById('searchInput').addEventListener('input', performSearch);
        document.getElementById('searchAttribute').addEventListener('change', performSearch);

        function performSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const searchAttribute = document.getElementById('searchAttribute').value;

            if (searchTerm.trim() === '') {
                filteredVoters = [...allVoters];
            } else {
                filteredVoters = allVoters.filter(voter => {
                    if (searchAttribute === 'all') {
                        // Search in all fields
                        return Object.values(voter).some(value => 
                            String(value).toLowerCase().includes(searchTerm)
                        );
                    } else {
                        // Search in specific field
                        const value = voter[searchAttribute];
                        return value && String(value).toLowerCase().includes(searchTerm);
                    }
                });
            }

            currentPage = 1;
            displayVoters();
            updatePagination();
        }
    </script>
