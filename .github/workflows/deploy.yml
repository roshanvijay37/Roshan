name: Deploy portfolio and TradingOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install portfolio dependencies
        run: npm ci

      - name: Build portfolio
        run: npm run build

      - name: Install TradingOS dependencies
        working-directory: trading-os
        run: npm install

      - name: Test TradingOS
        working-directory: trading-os
        run: npm test

      - name: Build TradingOS
        working-directory: trading-os
        run: npm run build

      - name: Add TradingOS to the Pages site
        run: |
          mkdir -p dist/trading-os
          cp -R trading-os/dist/. dist/trading-os/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
